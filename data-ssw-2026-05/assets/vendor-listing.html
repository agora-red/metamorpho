const KEEP = new Set(['active','active_after_free_trial','active_after_inactive','churn_requested']);
const tb = document.getElementById('tb');
let M = 'mar';
let sortK = 'ltv', sortDir = -1;

function badge(type, val){
  const v = (val || '').toString();
  const slug = v.toLowerCase().replace(/[^a-z0-9_]/g, '').replace(/plan/, '');
  const cls = type === 'plan'
    ? (v === 'Plan Pro' ? 'b-pro' : v === 'Plan Negocio' ? 'b-negocio' : v.startsWith('Enterprise') ? 'b-enterprise' : 'b-default')
    : (v === 'active' ? 's-active' : v === 'churn' ? 's-churn' : v === 'churn_requested' ? 's-churn_requested' : 's-default');
  return `<span class="badge ${cls}">${v || '—'}</span>`;
}

function rows(){
  return RAW.filter(d => d['active_' + M] && (KEEP.has(d['status_' + M]) || d.username === 'nume'))
    .map(d => ({
      username: d.username,
      plan: d.plan,
      rev: d['rev_' + M],
      ltv: d['ltv_' + M],
      lifetime: d['lifetime_' + M],
      status: d['status_' + M],
      pautada: d['pautada_' + M],
      pagada: d['pagada_' + M]
    }));
}

function render(){
  const filtered = rows().slice();
  filtered.sort((a, b) => {
    let x = a[sortK], y = b[sortK];
    if (typeof x === 'string') { x = (x || '').toLowerCase(); y = (y || '').toLowerCase(); }
    return x < y ? -sortDir : x > y ? sortDir : 0;
  });
  tb.innerHTML = filtered.map(d => `<tr>` +
    `<td><a href="https://www.agora.red/${encodeURIComponent(d.username)}" target="_blank" rel="noopener">${d.username}</a></td>` +
    `<td>${badge('plan', d.plan)}</td>` +
    `<td class="num">$${(d.rev || 0).toLocaleString()}</td>` +
    `<td class="ltv">$${(d.ltv || 0).toLocaleString()}</td>` +
    `<td class="num">${d.lifetime || 0}</td>` +
    `</tr>`).join('');
}

document.querySelectorAll('.monthswitch button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.monthswitch button').forEach(x => x.classList.remove('act'));
    b.classList.add('act');
    M = b.dataset.m;
    render();
  };
});
document.querySelectorAll('thead th').forEach(th => {
  th.onclick = () => {
    const k = th.dataset.k;
    if (sortK === k) sortDir *= -1;
    else { sortK = k; sortDir = (k === 'ltv' || k === 'rev' || k === 'lifetime') ? -1 : 1; }
    render();
  };
});
render();
</script></body></html>
